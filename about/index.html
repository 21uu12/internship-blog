<script>
(function () {
  function updateRuntime() {
    var start = new Date("2026/06/21 09:00:00");
    var now = new Date();
    var diff = now - start;
    if (diff < 0) diff = 0;
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    var el = document.getElementById("runtime_span");
    if (el) el.innerHTML = d + " 天 " + h + " 时 " + m + " 分 " + s + " 秒";
  }
  updateRuntime();
  setInterval(updateRuntime, 1000);
})();
</script>
